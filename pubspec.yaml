name: fintak
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  go_router: ^17.3.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  intl: ^0.20.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ── Config for Launcher Icons (Must be at root level with proper indentation) ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/fintak.png" # English path matching your assets folder
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo/fintak.png